<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <title>WrenchIQ</title>
  <style>
    body {
      margin: 0;
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 1.2rem;
      color: #94a3b8;
    }
    .cta {
      margin-top: 25px;
    }
    input {
      padding: 12px;
      width: 70%;
      border-radius: 6px;
      border: none;
      margin-right: 8px;
    }
    button {
      padding: 12px 18px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #16a34a;
    }
    .tag {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #64748b;
    }
    .status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #ffffff40;
  border-top: 2px solid #ffffff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-left: 8px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.logo {
  width: 280px;
  height: auto;
  margin-bottom: 10px;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
}

  </style>
</head>
<body>
  <div class="container">
    <img src="/img/wrenchLogo.png" alt="WrenchIQ logo" class="logo" />
    <h1>WrenchIQ</h1>
    <p>Your pocket mechanic. Get instant help diagnosing and fixing your car - coming soon to iOS!</p>
    <p>Sign up to be notified when we launch:</p>
    <div class="cta">
      <input id="emailInput" type="email" placeholder="Enter your email" />
      <button id="submitBtn">
  <span id="btnText">Get Notified</span>
  <span id="spinner" class="spinner" style="display:none;"></span>
</button>
      <div class="status" id="statusMsg"></div>
    </div>

    <div class="tag">
      VIN scan • AI diagnostics • DIY repair guidance
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const supabase = window.supabase.createClient(
      "https://fnsnftcwoshatkjquhyj.supabase.co",
      "sb_publishable_iRmZKqe9vTjABBZq73cTkw_n4tFAxgr"
    );

    const button = document.getElementById("submitBtn");
    const input = document.getElementById("emailInput");
    const status = document.getElementById("statusMsg");

    button.addEventListener("click", async () => {
  const email = input.value;

  if (!email || !email.includes("@")) {
    status.textContent = "Enter a valid email";
    return;
  }

  // 🔒 Disable + show spinner
  button.disabled = true;
  document.getElementById("btnText").textContent = "Submitting";
  document.getElementById("spinner").style.display = "inline-block";
  status.textContent = "";

  const { data, error } = await supabase
    .from("emails")
    .insert([{ email }]);

  console.log(data, error);

  // 🔓 Re-enable + hide spinner
  button.disabled = false;
  document.getElementById("btnText").textContent = "Get Notified";
  document.getElementById("spinner").style.display = "none";

  if (error) {
    status.textContent = "Error: " + error.message;
  } else {
    status.textContent = "You're in 🔧";
    input.value = "";
  }
});
  });
</script>
</body>
</html>
