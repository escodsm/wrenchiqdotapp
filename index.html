<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WrenchIQ</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
      color: #94a3b8;
    }
    .cta {
      margin-top: 25px;
    }
    input {
      padding: 12px;
      width: 70%;
      border-radius: 6px;
      border: none;
      margin-right: 8px;
    }
    button {
      padding: 12px 18px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #16a34a;
    }
    .tag {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WrenchIQ</h1>
    <p>Your pocket mechanic. Get instant help diagnosing and fixing your car.</p>

    <div class="cta">
      <input type="email" placeholder="Enter your email" />
      <button>Get Early Access</button>
    </div>

    <div class="tag">
      VIN scan • AI diagnostics • DIY repair guidance
    </div>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabase = window.supabase.createClient(
    "https://fnsnftcwoshatkjquhyj.supabase.co",
    "sb_publishable_iRmZKqe9vTjABBZq73cTkw_n4tFAxgr"
  );

  async function submitEmail() {
    const email = document.querySelector("input").value;

    const { error } = await supabase
      .from("emails")
      .insert([{ email }]);

    if (error) {
      alert("Something went wrong");
    } else {
      alert("You're in 🔧");
    }
  }
</script>
</html>
